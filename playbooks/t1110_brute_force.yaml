id: pb-t1110-block-brute-force
name: "Block Brute Force Source"
version: "1.1"
techniques:
  - T1110
  - T1110.001
  - T1110.003
tactics:
  - credential-access
description: "Block the attacking IP at the network perimeter, schedule auto-expiry, and lock the targeted account"

parameters:
  src_ip:
    type: ipv4
    required: true
    sources:
      - _source.data.srcip
      - data.srcip
      - srcip
    description: "Source IP performing the brute force — used in firewall DROP rules"
  hostname:
    type: string
    required: false
    sources:
      - _source.agent.name
      - agent.name
      - hostname
    description: "Target hostname (victim) — included in incident ticket and block log"
  username:
    type: string
    required: false
    sources:
      - _source.data.dstuser
      - data.dstuser
    description: "Targeted username — account will be locked via usermod -L; step is skipped on failure if not available"
  duration_hours:
    type: integer
    required: false
    default: 24
    description: "IP block duration in hours — used by 'at' to schedule automatic rule removal"

cacao:
  type: playbook
  spec_version: cacao-2.0
  id: "playbook--447c6b45-26ba-4bd8-8afa-076f0f37c3dc"
  name: "Block Brute Force from {{src_ip}}"
  description: >
    Block {{src_ip}} at the firewall for {{duration_hours}}h (auto-expires),
    lock account {{username}} on {{hostname}}, and open an incident ticket.
  playbook_types:
    - prevention
    - remediation
    - notification
  workflow_start: "step--block-ip"
  workflow:

    # Step 1 — Drop attacker IP immediately and schedule auto-expiry via `at`
    step--block-ip:
      type: action
      name: "Block {{src_ip}} at firewall for {{duration_hours}}h"
      commands:
        - type: bash
          command: >
            iptables -I INPUT  -s {{src_ip}} -j DROP &&
            iptables -I FORWARD -s {{src_ip}} -j DROP
        - type: bash
          # Schedule automatic rule removal after duration_hours
          command: >
            echo "iptables -D INPUT -s {{src_ip}} -j DROP &&
                  iptables -D FORWARD -s {{src_ip}} -j DROP" |
            at now + {{duration_hours}} hours
        - type: bash
          command: >
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')]
                  BLOCKED {{src_ip}} for {{duration_hours}}h (host={{hostname}})"
            >> /var/log/ai4soar_blocks.log
      on_success: "step--lock-account"
      on_failure: "step--lock-account"   # always proceed; ticket captures the failure

    # Step 2 — Lock the targeted user account so stolen credentials are invalidated
    #           on_failure is intentional: if username is absent or lock fails,
    #           the workflow still creates an incident ticket rather than stopping.
    step--lock-account:
      type: action
      name: "Lock account {{username}} on {{hostname}}"
      commands:
        - type: bash
          command: "usermod -L {{username}}"
        - type: bash
          command: >
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')]
                  LOCKED account {{username}} on {{hostname}}"
            >> /var/log/ai4soar_blocks.log
      on_success: "step--create-ticket"
      on_failure: "step--create-ticket"

    # Step 3 — Open an incident ticket with all four parameters captured
    step--create-ticket:
      type: action
      name: "Create security incident ticket"
      commands:
        - type: http-api
          command: "POST /api/v1/incidents"
          headers:
            Content-Type: "application/json"
          body: >
            {
              "title":           "Brute Force blocked from {{src_ip}}",
              "severity":        "high",
              "technique":       "T1110",
              "src_ip":          "{{src_ip}}",
              "hostname":        "{{hostname}}",
              "username":        "{{username}}",
              "block_duration_h": {{duration_hours}}
            }
      on_completion: "step--end"

    step--end:
      type: end
