id: pb-t1003-respond-credential-dump
name: "Respond to Credential Dumping"
version: "1.0"
techniques:
  - T1003
  - T1003.001
  - T1003.002
  - T1003.006
tactics:
  - credential-access
description: "Force password reset for exposed accounts, rotate service credentials, kill the dump process, and alert the SOC"

parameters:
  hostname:
    type: string
    required: true
    sources:
      - _source.agent.name
      - agent.name
      - hostname
    description: "Host where credential dumping was detected"
  username:
    type: string
    required: false
    sources:
      - _source.data.srcuser
      - data.srcuser
    description: "Account observed in the dump activity"
  src_ip:
    type: ipv4
    required: false
    sources:
      - _source.data.srcip
      - data.srcip
    description: "Host IP"

cacao:
  type: playbook
  spec_version: cacao-2.0
  id: "playbook--d5a9e3f2-6b0c-4d4e-9f2a-3c7b1d5e8f0a"
  name: "Respond to Credential Dump on {{hostname}}"
  description: "Kill credential dump process on {{hostname}}, force password reset for {{username}}, notify SOC"
  playbook_types:
    - remediation
    - notification
  workflow_start: "step--kill-dump-process"
  workflow:

    step--kill-dump-process:
      type: action
      name: "Kill credential dumping process on {{hostname}}"
      commands:
        - type: bash
          command: >
            ssh -o StrictHostKeyChecking=no {{hostname}}
            "pkill -9 -f 'procdump\|mimikatz\|lsass\|gsecdump\|wce\|fgdump' 2>/dev/null || true"
        - type: bash
          command: >
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] KILLED dump process on {{hostname}}" >> /var/log/ai4soar_blocks.log
      on_success: "step--force-password-reset"
      on_failure: "step--force-password-reset"

    step--force-password-reset:
      type: action
      name: "Force password reset for {{username}}"
      commands:
        - type: bash
          command: "chage -d 0 {{username}} 2>/dev/null || true"
        - type: bash
          command: "usermod -L {{username}} 2>/dev/null || true"
        - type: bash
          command: >
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] PASSWORD RESET forced for {{username}}" >> /var/log/ai4soar_blocks.log
      on_success: "step--audit-logons"
      on_failure: "step--create-ticket"

    step--audit-logons:
      type: action
      name: "Collect recent logon events from {{hostname}}"
      commands:
        - type: bash
          command: >
            ssh -o StrictHostKeyChecking=no {{hostname}}
            "last -20 > /tmp/ai4soar_logons_{{hostname}}.txt 2>/dev/null || true"
      on_completion: "step--create-ticket"

    step--create-ticket:
      type: action
      name: "Create credential dump incident ticket"
      commands:
        - type: http-api
          command: "POST /api/v1/incidents"
          headers:
            Content-Type: "application/json"
          body: >
            {
              "title":     "Credential Dumping on {{hostname}}",
              "severity":  "critical",
              "technique": "T1003",
              "hostname":  "{{hostname}}",
              "src_ip":    "{{src_ip}}",
              "username":  "{{username}}"
            }
      on_completion: "step--end"

    step--end:
      type: end
