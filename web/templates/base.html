<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI4SOAR{% endblock %} — AI4SOAR</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('web.static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/ui/">AI4SOAR</a>
    <div class="navbar-nav flex-row gap-1 ms-auto">
      <a class="nav-link px-3 rounded {% if request.path == '/ui/' %}active bg-primary bg-opacity-25{% endif %}" href="/ui/">
        <i class="bi bi-speedometer2 me-1"></i>Dashboard
      </a>
      <a class="nav-link px-3 rounded {% if '/ui/alerts' in request.path %}active bg-primary bg-opacity-25{% endif %}" href="/ui/alerts">
        <i class="bi bi-bell-fill me-1"></i>Alerts
      </a>
      <a class="nav-link px-3 rounded {% if '/ui/orchestration' in request.path %}active bg-primary bg-opacity-25{% endif %}" href="/ui/orchestration">
        <i class="bi bi-cpu me-1"></i>Orchestration
      </a>
      <a class="nav-link px-3 rounded {% if '/ui/playbooks' in request.path %}active bg-primary bg-opacity-25{% endif %}" href="/ui/playbooks">
        <i class="bi bi-journal-code me-1"></i>Playbooks
      </a>
      <a class="nav-link px-3 rounded {% if '/ui/verify' in request.path %}active bg-primary bg-opacity-25{% endif %}" href="/ui/verify">
        <i class="bi bi-patch-check me-1"></i>Verify
      </a>
    </div>
  </div>
</nav>

<main class="container-fluid p-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('web.static', filename='js/mitre_names.js') }}"></script>
<script src="{{ url_for('web.static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
